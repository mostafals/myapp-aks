apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: <TON-ACR>.azurecr.io/backend:latest
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: azure-sql-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: azure-sql-secret
              key: DB_PASSWORD
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: demo
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000